<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Cara</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <section id="header">
        <a href="index.html" class="brand-logo">
            <i class="bi bi-lightning-charge-fill"></i> TREND <span class="logo-accent">ARCADE</span>
        </a>
        <div>
            <ul id="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="lg-bag">
                    <a href="cart.html">
                        <i class="bi bi-bag"></i>
                        <span id="cart-count">0</span> 
                    </a>
                </li>
                <li id="user-welcome-li" style="display: none; font-weight: 600; color: #088178; padding: 0 20px;">
                    Welcome, <span id="welcome-username">Guest</span>!
                </li>
                <a href="#" id="close"><i class="bi bi-x"></i></a>
                <li><a href="#" onclick="handleLogout()">Logout</a></li>
            </ul>
        </div>
    </section>

    <section id="form-details" class="section-p1">
        <form id="checkout-form" onsubmit="placeOrder(event)">
            <span>SHIPPING DETAILS</span>
            <h2>Billing & Shipping Information</h2>
            
            <input type="text" id="cust-name" placeholder="Full Name" required>
            <input type="email" id="cust-email" placeholder="E-mail Address" required>
            <input type="text" id="cust-phone" placeholder="Phone Number" required>
            <input type="text" id="cust-address" placeholder="Flat, House no., Building, Company" required>
            <input type="text" id="cust-city" placeholder="Town / City" required>
            <input type="text" id="cust-pin" placeholder="Postcode / ZIP" required>
            
            <button class="normal" type="submit">Place Order</button>
        </form>

        <div class="people" style="border-left: 1px solid #e1e1e1; padding-left: 40px; width: 30%;">
            <h3>Your Order Total</h3>
            <br>
            <h2 id="checkout-total-val" style="color: #088178; padding: 0;">$ 0.00</h2>
            <p style="font-size: 13px; color: #606063;">Shipping is completely free on all orders today!</p>
        </div>
    </section>

    <footer class="section-p1">
        <div class="copyright">
            <p>@ 2021, Tech2 etc - HTML CSS Ecommerce Template</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
